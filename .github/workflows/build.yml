name: Build ESP32-S3 Firmware (3 Binaries)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PlatformIO
        run: pip install -U platformio

      - name: Build Firmware
        run: pio run -e esp32-s3-devkitc-1

      - name: Upload Bootloader
        uses: actions/upload-artifact@v4
        with:
          name: bootloader.bin
          path: .pio/build/esp32-s3-devkitc-1/bootloader.bin

      - name: Upload Partitions
        uses: actions/upload-artifact@v4
        with:
          name: partitions.bin
          path: .pio/build/esp32-s3-devkitc-1/partitions.bin

      - name: Upload App Firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware.bin
          path: .pio/build/esp32-s3-devkitc-1/firmware.bin
